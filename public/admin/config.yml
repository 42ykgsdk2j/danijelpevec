# Decap CMS configuration — edit blog posts and site copy via /admin/.
#
# Backend: GitHub OAuth via our own /api/auth + /api/callback proxy
# (runs as Vercel serverless functions; the Client Secret never leaves the
# server). The OAuth app's callback URL must be
#   https://www.danijelpevec.com/api/callback

backend:
  name: github
  repo: 42ykgsdk2j/danijelpevec
  branch: main
  base_url: https://www.danijelpevec.com
  auth_endpoint: api/auth

# Live preview while editing
publish_mode: simple
site_url: https://www.danijelpevec.com
display_url: https://www.danijelpevec.com

# Media library — images attached to blog posts land here
media_folder: public/uploads
public_folder: /uploads

collections:
  # ===================================================================
  # Blog posts (EN)
  # ===================================================================
  - name: blog_en
    label: "Blog (English)"
    label_singular: "Post"
    folder: src/content/blog/en
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{title}} — {{date | date('YYYY-MM-DD')}}"
    # Filename derives from the title via Decap's built-in slugifier:
    # "Hello World" → hello-world.md. The URL is taken from the filename,
    # so users don't have to think about slugs at all.
    fields:
      - { name: title, label: Title, widget: string }
      - { name: excerpt, label: "Excerpt (1–2 sentences, shown on the Blog index card)", widget: text }
      - { name: category, label: Category, widget: string, hint: "e.g. Succession, Wealth Transition, Continuity, Governance, Next Generation, Exit Strategy, Advisory, Family Dynamics, Legacy" }
      - { name: date, label: "Date & time published", widget: datetime, format: "YYYY-MM-DDTHH:mm", picker_utc: false, hint: "Posts are sorted newest-first, so the time matters when two posts share a day." }
      - { name: readTime, label: "Read time (minutes)", widget: number, default: 7, value_type: int, min: 1 }
      - { name: cover, label: "Cover image", widget: image, required: false, hint: "Shown at the top of the article, after the byline. Optional." }
      - { name: coverAlt, label: "Cover image alt text", widget: string, required: false, hint: "Short description for screen readers and SEO. Skip if the image is purely decorative." }
      - { name: body, label: Body, widget: markdown }

  # ===================================================================
  # Blog posts (HR)
  # ===================================================================
  - name: blog_hr
    label: "Objave (hrvatski)"
    label_singular: "Objava"
    folder: src/content/blog/hr
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{title}} — {{date | date('YYYY-MM-DD')}}"
    fields:
      - { name: title, label: Naslov, widget: string }
      - { name: excerpt, label: "Sažetak (1–2 rečenice, pojavljuje se na popisu objava)", widget: text }
      - { name: category, label: Kategorija, widget: string }
      - { name: date, label: "Datum i vrijeme objave", widget: datetime, format: "YYYY-MM-DDTHH:mm", picker_utc: false, hint: "Objave su poredane od najnovije; vrijeme je važno kad dva članka dijele isti dan." }
      - { name: readTime, label: "Vrijeme čitanja (minuta)", widget: number, default: 7, value_type: int, min: 1 }
      - { name: cover, label: "Naslovna slika", widget: image, required: false, hint: "Prikazuje se na vrhu članka, ispod potpisa autora. Neobavezno." }
      - { name: coverAlt, label: "Opis naslovne slike (alt)", widget: string, required: false, hint: "Kratki opis za čitače zaslona i SEO. Preskočite ako je slika dekorativna." }
      - { name: body, label: Tekst, widget: markdown }
